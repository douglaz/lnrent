name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The per-push gate: clippy + every non-ignored test (incl. the mocked end-to-end
  # money path in daemon/tests/e2e_money_path.rs) with the real Fedimint tree compiled
  # in (default feature), plus the mock-only build. Runs inside the Nix devshell so
  # rustc + the bundled RocksDB/C++ toolchain match local. The live regtest-federation
  # e2e is a separate, heavier workflow (.github/workflows/fedimint-live.yml).
  lint-test:
    name: lint + test (nix devshell)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # RocksDB + the fedimint tree + target/ are large; reclaim runner disk first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h / | tail -1

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Cache cargo registry/git + target/ keyed on Cargo.lock so the (heavy) first
      # fedimint/rocksdb build is only paid on a cache miss.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: clippy (workspace, all targets — default = fedimint)
        run: nix develop . --command cargo clippy --workspace --all-targets

      - name: test (workspace — includes the mocked e2e money path)
        run: nix develop . --command cargo test --workspace

      - name: build mock-only (no fedimint/rocksdb tree)
        run: nix develop . --command cargo build -p lnrentd --no-default-features
