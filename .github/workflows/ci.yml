name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The per-push gate: clippy + every non-ignored test (incl. the mocked end-to-end
  # money path in daemon/tests/e2e_money_path.rs) with the real Fedimint tree compiled
  # in (default feature), plus the mock-only build. Runs inside the Nix devshell so
  # rustc + the bundled RocksDB/C++ toolchain match local. The live regtest-federation
  # e2e is a separate, heavier workflow (.github/workflows/fedimint-live.yml).
  lint-test:
    name: lint + test (nix devshell)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      # RocksDB + the fedimint tree + target/ are large; reclaim runner disk first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h / | tail -1

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Cache cargo registry/git + target/ keyed on Cargo.lock so the (heavy) first
      # fedimint/rocksdb build is only paid on a cache miss.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: clippy (workspace, all targets — default = fedimint)
        run: nix develop . --command cargo clippy --workspace --all-targets

      - name: test (workspace — includes the mocked e2e money path)
        run: nix develop . --command cargo test --workspace

      - name: build mock-only (no fedimint/rocksdb tree)
        run: nix develop . --command cargo build -p lnrentd --no-default-features

      # The web buyer (clients/web) is wasm-primary — most of it is #[cfg(target_arch = "wasm32")]
      # (the NIP-07 bridge, the browser Relay, the wired flows), which the host clippy/test above do
      # NOT compile. Gate the wasm32 target explicitly so a wasm-only regression can't pass green.
      - name: clippy + build the web buyer for wasm32
        run: |
          nix develop . --command cargo clippy -p lnrent-buyer-web --target wasm32-unknown-unknown
          nix develop . --command cargo build  -p lnrent-buyer-web --target wasm32-unknown-unknown

  # The web buyer's FUNCTIONAL acceptance gate: build the wasm bundle, spawn a mock lnrentd + local
  # relay + a static server + headless Chrome, and drive the SPA through the full loop (settling the
  # mock invoice out-of-band via `lnrent dev settle`). ubuntu-latest ships google-chrome-stable + node
  # + python3, all reachable inside `nix develop` (which keeps the runner PATH). The daemon is built
  # mock-only (no fedimint/rocksdb tree), so this stays light.
  web-e2e:
    name: web buyer headless e2e (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          df -h / | tail -1

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true

      - name: tooling check (chrome + node + python on the runner)
        run: |
          (command -v google-chrome-stable || command -v google-chrome || command -v chromium) || { echo "no chrome on runner"; exit 1; }
          node --version && python3 --version

      - name: web buyer e2e — WebLN path
        run: nix develop . --command bash -c 'bash clients/web/e2e/run.sh'

      - name: web buyer e2e — no-NIP-07/no-WebLN fallback (QR/copy)
        run: nix develop . --command bash -c 'NO_WEBLN=1 bash clients/web/e2e/run.sh'
