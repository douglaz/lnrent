[service]
id = "wireguard"
name = "WireGuard VPN"
summary = "Private WireGuard peer, 1 device, unmetered."
version = "0.1.0"
category = ["vpn", "privacy"]

[pricing]
amount_sat = 5000
period = "30d"
renew_lead = "7d"
retention = "7d"

[provisioning]
backend = "host"
isolation = "none"
tier = "0"
resources = { cpu = 0, mem_mb = 0, disk_gb = 0 }

[os]
supports = ["nixos", "debian"]

[[params]]
key = "pubkey"
label = "Your WireGuard public key"
type = "string"
required = true

# Buyer-facing management operations (SPEC.md §7.4, ADR-0013). Dispatched by the daemon
# to ops/<hook>; request-kind ops ride the op.request/op.result DM pair.
[[operation]]
name = "status"
label = "Service status"
kind = "request"
hook = "ops/status"

[[operation]]
name = "restart"
label = "Restart service"
kind = "request"
hook = "ops/restart"

[[operation]]
name = "get-config"
label = "Download WireGuard config"
kind = "request"
hook = "ops/get-config"
